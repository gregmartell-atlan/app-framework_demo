# Pre-commit hooks for Atlan GitHub connector
# Excludes app/generated/_input.py per v3 compliance rule 14

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^app/generated/_input\.py$
      - id: ruff-format
        exclude: ^app/generated/_input\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.350
    hooks:
      - id: pyright
        exclude: ^app/generated/_input\.py$
        additional_dependencies:
          - atlan-application-sdk==3.4.0
          - httpx>=0.27
          - pydantic>=2.7
          - pyatlan-v9>=2.0
          - GitPython>=3.1
